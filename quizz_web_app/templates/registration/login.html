{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Quizz App</title>
  <link rel="stylesheet" href="{% static 'quizz_web_app/styles.css' %}">
</head>
<body style="background: var(--sidebar-bg);">
  <div class="auth-page">
    <div class="card auth-card">
      <div class="brand"><span class="logo">Q</span> Quizz App</div>
      <h1>Sign in</h1>
      <form method="post">
        {% csrf_token %}
        {% if form.errors %}
          <div class="auth-error">Invalid username or password. Please try again.</div>
        {% endif %}
        <p>
          <label for="id_username">Username</label>
          {{ form.username }}
        </p>
        <p>
          <label for="id_password">Password</label>
          {{ form.password }}
        </p>
        <button type="submit" class="btn btn-primary">Log in</button>
      </form>
    </div>
  </div>
</body>
</html>
