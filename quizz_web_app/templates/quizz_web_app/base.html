{% load static quizz_extras %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Quizz App{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'quizz_web_app/styles.css' %}">
</head>
<body>
  <aside class="sidebar">
    <a href="{% url 'index' %}" class="brand"><span class="logo">Q</span> Quizz App</a>
    <nav>
      <a href="{% url 'index' %}" class="{% if request.resolver_match.url_name == 'index' %}active{% endif %}"><span class="icon">🏠</span> Home</a>
      <a href="{% url 'domain_list' %}" class="{% if request.resolver_match.url_name|startswith:'domain' %}active{% endif %}"><span class="icon">📁</span> Domains</a>
      <a href="{% url 'subdomain_list' %}" class="{% if request.resolver_match.url_name|startswith:'subdomain' %}active{% endif %}"><span class="icon">🗂️</span> Subdomains</a>
      <a href="{% url 'question_list' %}" class="{% if request.resolver_match.url_name|startswith:'question' %}active{% endif %}"><span class="icon">❓</span> Questions</a>
      <a href="{% url 'quiz_list' %}" class="{% if request.resolver_match.url_name|startswith:'quiz' %}active{% endif %}"><span class="icon">📝</span> Quizzes</a>
    </nav>
    <div class="user">
      <div class="avatar">{{ user.username|slice:":2" }}</div>
      <div class="meta">
        <div class="username">{{ user.username }}</div>
        <a href="{% url 'logout' %}">Log out</a>
      </div>
    </div>
  </aside>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
