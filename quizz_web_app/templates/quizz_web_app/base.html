<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Quizz App{% endblock %}</title>
  <style>
    body { font-family: sans-serif; max-width: 860px; margin: 2rem auto; padding: 0 1rem; }
    nav a { margin-right: 1rem; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #ccc; padding: .5rem .75rem; text-align: left; }
    th { background: #f4f4f4; }
    .actions { display: flex; gap: .5rem; align-items: center; }
    .btn { display: inline-block; padding: .35rem .75rem; text-decoration: none; border: 1px solid #999; border-radius: 3px; white-space: nowrap; }
    .btn-danger { background: #c0392b; color: #fff; border-color: #c0392b; }
    .btn-primary { background: #2980b9; color: #fff; border-color: #2980b9; }
    .correct { color: #27ae60; font-weight: bold; }
    .incorrect { color: #c0392b; font-weight: bold; }
    .question-block { border: 1px solid #ddd; border-radius: 4px; padding: 1rem; margin-bottom: 1rem; }
    .question-block textarea { width: 100%; box-sizing: border-box; margin-top: .5rem; }
    .score-banner { font-size: 1.4rem; margin-bottom: 1.5rem; }
  </style>
</head>
<body>
  <nav>
    <a href="{% url 'index' %}">Home</a>
    <a href="{% url 'domain_list' %}">Domains</a>
    <a href="{% url 'subdomain_list' %}">Subdomains</a>
    <a href="{% url 'question_list' %}">Questions</a>
    <a href="{% url 'quiz_list' %}">Quizzes</a>
  </nav>
  <hr>
  {% block content %}{% endblock %}
</body>
</html>
