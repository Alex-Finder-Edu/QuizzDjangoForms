{% extends "quizz_web_app/base.html" %}
{% block title %}Domains{% endblock %}
{% block content %}
<h1>Domains</h1>
<a href="{% url 'domain_create' %}" class="btn">+ Add Domain</a>
<br><br>
<table>
  <thead>
    <tr><th>Name</th><th>Subdomains</th><th>Actions</th></tr>
  </thead>
  <tbody>
    {% for domain in domains %}
    <tr>
      <td>{{ domain.name }}</td>
      <td>{{ domain.subdomains.count }}</td>
      <td>
        <div class="actions">
          <a href="{% url 'domain_update' domain.pk %}" class="btn">Edit</a>
          <a href="{% url 'domain_delete' domain.pk %}" class="btn btn-danger">Delete</a>
        </div>
      </td>
    </tr>
    {% empty %}
    <tr><td colspan="3">No domains yet.</td></tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
