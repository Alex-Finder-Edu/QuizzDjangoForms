{% extends "quizz_web_app/base.html" %}
{% block title %}Delete {{ object }}{% endblock %}
{% block content %}
<h1>Delete "{{ object }}"?</h1>
<p>This action cannot be undone.</p>
<form method="post">
  {% csrf_token %}
  <button type="submit" class="btn btn-danger">Yes, delete</button>
  <a href="{% url cancel_url %}">Cancel</a>
</form>
{% endblock %}
