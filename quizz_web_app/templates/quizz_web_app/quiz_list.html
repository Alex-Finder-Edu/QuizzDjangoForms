{% extends "quizz_web_app/base.html" %}
{% block title %}Quizzes{% endblock %}
{% block content %}
<h1>Quizzes</h1>
<a href="{% url 'quiz_create' %}" class="btn">+ Create Quiz</a>
<br><br>
<table>
  <thead>
    <tr><th>Title</th><th>Questions</th><th>Actions</th></tr>
  </thead>
  <tbody>
    {% for quiz in quizzes %}
    <tr>
      <td>{{ quiz.title }}</td>
      <td>{{ quiz.questions.count }}</td>
      <td class="actions">
        <a href="{% url 'quiz_take' quiz.pk %}" class="btn btn-primary">Take</a>
        <a href="{% url 'quiz_update' quiz.pk %}" class="btn">Edit</a>
        <a href="{% url 'quiz_delete' quiz.pk %}" class="btn btn-danger">Delete</a>
      </td>
    </tr>
    {% empty %}
    <tr><td colspan="3">No quizzes yet.</td></tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
